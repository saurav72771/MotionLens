<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>Unity WebGL Player | AssetOptimiser</title>
</head>

<body style="text-align: center; padding: 0; border: 0; margin: 0;">

  <canvas id="unity-canvas" width=960 height=600 style="width: 960px; height: 600px; background: #231F20"></canvas>

  <!-- Unity Loader -->
  <script src="Build/Metaverse.loader.js"></script>

  <!-- MediaPipe -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/face_detection.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

  <!-- Hidden video -->
  <video id="video" autoplay playsinline style="display:none;"></video>

 <script>
  let unityInstanceRef = null;
  let smoothX = 0;
  let lastSent = 0;

  const SMOOTHING = 0.15;   // lower = smoother
  const SEND_INTERVAL = 30; // ms (limit spam to Unity)

  var canvas = document.querySelector("#unity-canvas");

  // Mobile handling
  if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
    var meta = document.createElement('meta');
    meta.name = 'viewport';
    meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no';
    document.getElementsByTagName('head')[0].appendChild(meta);

    canvas.style.width = "100%";
    canvas.style.height = "100%";
    canvas.style.position = "fixed";

    document.body.style.textAlign = "left";
  }

  // ✅ Create Unity instance
  createUnityInstance(canvas, {
    dataUrl: "Build/Metaverse.data",
    frameworkUrl: "Build/Metaverse.framework.js",
    codeUrl: "Build/Metaverse.wasm",
    streamingAssetsUrl: "StreamingAssets",
    companyName: "DefaultCompany",
    productName: "AssetOptimiser",
    productVersion: "0.1",
  }).then((unityInstance) => {
    unityInstanceRef = unityInstance;
    startCameraAndTracking();
  });

  function startCameraAndTracking() {

    const video = document.getElementById('video');

    navigator.mediaDevices.getUserMedia({ video: true })
      .then(stream => {
        video.srcObject = stream;
      })
      .catch(err => {
        console.error("Camera access denied:", err);
      });

    const faceDetection = new FaceDetection({
      locateFile: (file) => {
        return `https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/${file}`;
      }
    });

    faceDetection.setOptions({
      model: 'short',
      minDetectionConfidence: 0.6
    });

    faceDetection.onResults(results => {
      if (results.detections.length > 0 && unityInstanceRef) {

        const box = results.detections[0].boundingBox;

        let x = box.xCenter;               // 0 → 1
        let normalized = (x - 0.5) * 2;    // -1 → +1

        // 🟢 SMOOTHING (major jitter fix)
        smoothX = smoothX * (1 - SMOOTHING) + normalized * SMOOTHING;

        // 🟡 SEND RATE LIMIT (prevents micro jitter)
        let now = Date.now();
        if (now - lastSent > SEND_INTERVAL) {
          lastSent = now;

          unityInstanceRef.SendMessage(
            "Cube",
            "RotateFromJS",
            smoothX.toFixed(4)
          );
        }
      }
    });

    const camera = new Camera(video, {
      onFrame: async () => {
        await faceDetection.send({ image: video });
      },
      width: 640,
      height: 480
    });

    camera.start();
  }
</script>

</body>
</html>
